name: evals

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trigger-eval:
    name: Trigger eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - run: python evals/trigger/run.py

  cost-model-eval:
    name: Cost model assertions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python evals/cost-model/assert_cost_model.py
