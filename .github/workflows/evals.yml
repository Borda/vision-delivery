name: evals

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trigger-eval:
    name: Trigger eval (detect-and-analyze)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node evals/trigger/run.mjs

  cost-model-eval:
    name: Cost model assertions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python evals/cost-model/assert_cost_model.py
