# S3 — standalone deploy entry from a fresh session (probed the pre-v0.2 missing delivery skill).
# Archetype: closed-loop response (detections drive an automated action with a
# latency bound, not a passive report). Grounded in private user research; source
# material intentionally not in repo. Prompt rev 2 (2026-07-11); the published v3
# matrix ran rev-1 prompts — never mix rev-1 and rev-2 runs in one aggregate.
id: s3-deploy-fresh
cold_prompt: >
  I already have a working defect model on Roboflow that passes our checks —
  help me put it in production on the line. Important detail: a detection has
  to trigger an automated response within seconds, not end up in a dashboard
  somebody reads later.
persona: scripted
caps:
  max_agent_turns: 8
  max_credits: 20
notes: >
  At benchmark time (pre-v0.2), no standalone delivery skill existed; the gap was
  measured, not assumed. A good arm reaches project_deployment_launch with a confirmed
  credit estimate; a lost arm stalls or re-enters build methodology.
