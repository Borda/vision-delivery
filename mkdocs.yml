site_name: vision-delivery
site_description: Business-first computer-vision delivery copilot for Codex and Claude Code, with explicit evidence, safety, and production boundaries.
site_url: https://borda.github.io/vision-delivery/
repo_url: https://github.com/Borda/vision-delivery
repo_name: Borda/vision-delivery
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/roboflow.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - meta
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mermaid2:
      version: 10.9.1

nav:
  - Start Here: index.md
  - Guides:
      - Quick Start: quickstart.md
      - Use Cases: use-cases.md
      - Workflow: workflow.md
      - CV Economics: economics.md
      - Roboflow Skills: roboflow-skills.md
  - Foundations & Evidence:
      - Support & Evidence: support-and-scope.md
      - Trust And Safety: trust.md
      - FAQ: faq.md
      - Compatibility: compatibility.md
      - Release Policy: release-policy.md
  - Benchmarks:
      - Overview: benchmarks/index.md
      - B1 — Conveyor detect: benchmarks/b1-conveyor-detect.md
      - B2 — PPE compliance: benchmarks/b2-classify-or-flag.md
      - B3 — Shopper tracking: benchmarks/b3-track-in-video.md
      - B4 — OCR extraction: benchmarks/b4-read-text-ocr.md
      - B5 — Measurement: benchmarks/b5-measure-in-image.md
      - Synthetic A/B: benchmarks/ab-plugin-vs-plain.md
      - Annotated A/B transcripts: benchmarks/ab-transcripts.md
