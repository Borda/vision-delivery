site_name: vision-delivery
site_description: Eval-first Codex and Claude Code plugin for solving real computer-vision tasks with measured proof, Roboflow artifacts, and CV economics.
site_url: https://borda.github.io/vision-delivery/
repo_url: https://github.com/Borda/vision-delivery
repo_name: Borda/vision-delivery
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/roboflow.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - meta
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Start Here: index.md
  - Quick Start: quickstart.md
  - Use Cases: use-cases.md
  - Workflow: workflow.md
  - CV Economics: economics.md
  - Roboflow Skills: roboflow-skills.md
  - Trust And Safety: trust.md
  - FAQ: faq.md
  - Benchmarks:
      - Overview: benchmarks/index.md
      - B1 — Conveyor detect: benchmarks/b1-conveyor-detect.md
      - B2 — PPE compliance: benchmarks/b2-classify-or-flag.md
      - B3 — Shopper tracking: benchmarks/b3-track-in-video.md
      - B4 — OCR extraction: benchmarks/b4-read-text-ocr.md
      - B5 — Measurement: benchmarks/b5-measure-in-image.md
